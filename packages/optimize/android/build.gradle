buildscript {
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:8.1.1'
    }
}

def isNewArchitectureEnabled() {
    return rootProject.hasProperty("newArchEnabled") && rootProject.newArchEnabled == "true"
}

if (isNewArchitectureEnabled()) {
    apply plugin: 'com.facebook.react'
}

apply plugin: 'com.android.library'

def safeExtGet(prop, fallback) {
    rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

android {
    compileSdk safeExtGet('compileSdk', 34)

    def agpVersion = com.android.Version.ANDROID_GRADLE_PLUGIN_VERSION.tokenize('.')[0].toInteger()
    if (agpVersion >= 8) {
        namespace = "com.adobe.marketing.mobile.reactnative.optimize"
    }

    defaultConfig {
        minSdkVersion safeExtGet('minSdkVersion', 21)
        targetSdkVersion safeExtGet('targetSdkVersion', 34)
        versionCode 1
        versionName "1.0"
        // Build-time switch: true = Interop root (AEPOptimize), false = Turbo root (NativeAEPOptimize).
        // Only one root is constructed; the other is dead code. App may override in app/build.gradle.
        buildConfigField "boolean", "USE_INTEROP_ROOT", "false"
    }
    buildFeatures {
        buildConfig true
    }
    lintOptions {
        abortOnError false
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    implementation "com.facebook.react:react-native:+"
    implementation platform("com.adobe.marketing.mobile:sdk-bom:3.+")
    api "com.adobe.marketing.mobile:optimize"
}