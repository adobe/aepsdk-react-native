pluginManagement {
    includeBuild("../node_modules/@react-native/gradle-plugin")
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}
plugins { id("com.facebook.react.settings") }

def nodeExecutable = System.getenv("NODE_BINARY") ?: "node"
def cliScript = file("../node_modules/@react-native-community/cli/build/bin.js").absolutePath

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    ex.autolinkLibrariesFromCommand(
        [nodeExecutable, cliScript, "config"],
        file(".."),
        settings.layout.rootDirectory.dir("..").files("yarn.lock", "package-lock.json", "package.json", "react-native.config.js")
    )
}

rootProject.name = 'AEPSampleApp'
include ':app'
