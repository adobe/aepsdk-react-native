pluginManagement {
    includeBuild("../node_modules/@react-native/gradle-plugin")
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}
plugins { id("com.facebook.react.settings") }

// Dynamically find node via nvm's default alias, then fall back to PATH.
// Avoids hardcoding a version that may not be installed on every machine.
def nodeExecutable = { ->
    def home = System.getenv("HOME")
    def nvmDir = System.getenv("NVM_DIR") ?: "$home/.nvm"
    def defaultAlias = new File("$nvmDir/alias/default")
    if (defaultAlias.exists()) {
        def ver = defaultAlias.text.trim()
        if (!ver.startsWith("v")) ver = "v$ver"
        def candidate = new File("$nvmDir/versions/node/$ver/bin/node")
        if (candidate.exists()) return candidate.absolutePath
    }
    // Fallback: 'node' must be on PATH
    return "node"
}()
def cliScript = file("../node_modules/@react-native-community/cli/build/bin.js").absolutePath

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    ex.autolinkLibrariesFromCommand(
        [nodeExecutable, cliScript, "config"],
        file(".."),
        settings.layout.rootDirectory.dir("..").files("yarn.lock", "package-lock.json", "package.json", "react-native.config.js")
    )
}

rootProject.name = 'AEPSampleApp'
include ':app'
